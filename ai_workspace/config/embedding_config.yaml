# Embedding model configuration
# Server port: 8090 (local llama.cpp server)

model:
  # Path to embedding model file (absolute or relative from project root)
  # Download via: huggingface_hub.snapshot_download(repo_id='nomic-ai/nomic-embed-text-v1.5', local_dir='./models/embeddings')
  model_path: "./models/embeddings/nomic-embed-text-v1.5.Q4_K_M.gguf"
  
  # Model name (for identification in logs)
  model_name: "nomic-embed-text-v1.5"
  
  # Port on which embedding server listens
  port: 8090
  
  # Endpoint for requests to embedding model
  endpoint: "http://localhost:{{port}}/v1/embeddings"
  
  # Response timeout (seconds)
  timeout: 15

server:
  # Host on which embedding server runs
  host: "127.0.0.1"
  
  # Server port (must be unique, no conflicts with other models)
  port: 8090
  
  # Maximum number of threads for processing requests
  max_workers: 4
  
  # Cache for embeddings (to speed up repeated requests)
  cache_enabled: true
  cache_ttl: 3600

retrieval:
  # Number of top results to return
  top_k: 5
  
  # Hybrid search (vector + keywords)
  hybrid_search: true
  
  # Reranking results
  rerank: true
  
  # Chunk size for document splitting
  chunk_size: 512
  
  # Chunk overlap
  chunk_overlap: 50

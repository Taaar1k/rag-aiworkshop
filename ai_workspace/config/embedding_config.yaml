# Конфігурація моделі ембедингів
# Порт сервера: 8090 (локальний llama.cpp сервер)

model:
  # Шлях до файлу моделі ембедингів (абсолютний або відносний від кореня проекту)
  # Download via: huggingface_hub.snapshot_download(repo_id='nomic-ai/nomic-embed-text-v1.5', local_dir='./models/embeddings')
  model_path: "./models/embeddings/nomic-embed-text-v1.5.Q4_K_M.gguf"
  
  # Ім'я моделі (для ідентифікації в логах)
  model_name: "nomic-embed-text-v1.5"
  
  # Порт, на якому слухає сервер ембедингів
  port: 8090
  
  # Ендпоінт для запитів до ембединг моделі
  endpoint: "http://localhost:{{port}}/v1/embeddings"
  
  # Час очікування відповіді (секунди)
  timeout: 15

server:
  # Хост, на якому працює сервер ембедингів
  host: "127.0.0.1"
  
  # Порт сервера (має бути унікальним, не конфліктує з іншими моделями)
  port: 8090
  
  # Максимальна кількість потоків для обробки запитів
  max_workers: 4
  
  # Кеш для ембедингів (для прискорення повторних запитів)
  cache_enabled: true
  cache_ttl: 3600

retrieval:
  # Кількість топ-результатів для повернення
  top_k: 5
  
  # Гібридний пошук (векторний + ключові слова)
  hybrid_search: true
  
  # Рерайтинг результатів
  rerank: true
  
  # Розмір чанка для розбиття документів
  chunk_size: 512
  
  # Перекриття чанків (overlap)
  chunk_overlap: 50

# RAG Server Configuration
# This file defines the configuration for the shared RAG server

server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  workers: 1

qdrant:
  host: "localhost"
  port: 6333
  collection_name: "rag_documents"
  vector_size: 768
  distance: "cosine"

embedding:
  model: "all-MiniLM-L6-v2"
  provider: "sentence-transformers"
  timeout: 30

llm:
  model_path: "models/llm/Llama-3-8B-Instruct-Q4_K_M.gguf"
  model_type: "gguf"
  n_ctx: 2048
  n_threads: 4
  n_gpu_layers: 0
  temperature: 0.7
  max_tokens: 512

retrieval:
  top_k: 5
  score_threshold: 0.5
  rerank: true
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

api:
  rate_limit: 100
  rate_limit_window: 60
  auth_enabled: false
  api_key: null

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/rag_server.log"

metrics:
  enabled: true
  endpoint: "/metrics"
  prometheus_port: 9090
